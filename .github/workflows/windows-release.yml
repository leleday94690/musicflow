name: Windows Release

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: MusicFlow API base URL
        required: true
        default: http://8.136.123.14
      version:
        description: Release version used in artifact name
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.7
          cache: false

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build Windows
        run: flutter build windows --release --dart-define=MUSICFLOW_API_BASE_URL=${{ inputs.api_base_url }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $inputVersion = '${{ inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($inputVersion)) {
            $line = Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1
            $inputVersion = $line.Line -replace '^version:\s*', ''
          }
          "value=$inputVersion" >> $env:GITHUB_OUTPUT

      - name: Package Windows release
        id: package
        shell: pwsh
        run: |
          $zipName = "MusicFlow-Windows-${{ steps.version.outputs.value }}.zip"
          $releaseDir = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "..\$zipName" -Force
          $hash = (Get-FileHash "..\$zipName" -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item "..\$zipName").Length
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          "size=$size" >> $env:GITHUB_OUTPUT
          Write-Host "zip=$zipName"
          Write-Host "zip_sha256=$hash"
          Write-Host "zip_size=$size"

      - name: Build Windows installer
        id: installer
        shell: pwsh
        run: |
          $setupBaseName = "MusicFlow-Setup-${{ steps.version.outputs.value }}"
          $setupName = "$setupBaseName.exe"
          $releaseDir = (Resolve-Path "build\windows\x64\runner\Release").Path
          $outputDir = (Resolve-Path "..").Path
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "windows\installer\musicflow.iss" "/DMyAppVersion=${{ steps.version.outputs.value }}" "/DMySourceDir=$releaseDir" "/DMyOutputDir=$outputDir" "/DMyOutputBaseFilename=$setupBaseName"
          $hash = (Get-FileHash "..\$setupName" -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item "..\$setupName").Length
          "setup_name=$setupName" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          "size=$size" >> $env:GITHUB_OUTPUT
          Write-Host "setup=$setupName"
          Write-Host "setup_sha256=$hash"
          Write-Host "setup_size=$size"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MusicFlow-Windows-${{ steps.version.outputs.value }}
          path: |
            ${{ steps.package.outputs.zip_name }}
            ${{ steps.installer.outputs.setup_name }}
          if-no-files-found: error

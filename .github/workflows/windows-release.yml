name: Windows Release

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: MusicFlow API base URL
        required: true
        default: http://8.136.123.14
      version:
        description: Release version used in artifact name
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build Windows
        run: flutter build windows --release --dart-define=MUSICFLOW_API_BASE_URL=${{ inputs.api_base_url }}

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $inputVersion = '${{ inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($inputVersion)) {
            $line = Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1
            $inputVersion = ($line.Line -replace '^version:\s*', '') -replace '\+', '-'
          }
          "value=$inputVersion" >> $env:GITHUB_OUTPUT

      - name: Package Windows release
        id: package
        shell: pwsh
        run: |
          $artifactName = "MusicFlow-Windows-${{ steps.version.outputs.value }}.zip"
          $releaseDir = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "..\$artifactName" -Force
          $hash = (Get-FileHash "..\$artifactName" -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item "..\$artifactName").Length
          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          "size=$size" >> $env:GITHUB_OUTPUT
          Write-Host "artifact=$artifactName"
          Write-Host "sha256=$hash"
          Write-Host "size=$size"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.artifact_name }}
          if-no-files-found: error
